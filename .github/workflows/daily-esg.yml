name: ESG Daily Paper Collector

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch:        # 수동 실행 (테스트용)
    inputs:
      days:
        description: '수집 기간 (일)'
        default: '3'
      max_summaries:
        description: '최대 요약 건수 (무료 한도: 20/일)'
        default: '15'

env:
  PYTHON_VERSION: '3.11'

permissions:
  contents: write   # docs/ 커밋 + push 허용

jobs:
  # ── JOB 1: 논문 수집 + PDF 다운로드 ──────────────────────────
  collect:
    name: 📥 수집 + PDF 다운로드
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      collected_count: ${{ steps.collect.outputs.collected }}
      date_str: ${{ steps.collect.outputs.date_str }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 논문 수집 + PDF 다운로드
        id: collect
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DAYS=${{ github.event.inputs.days || '3' }}
          DATE_STR=$(python -c "from datetime import datetime; print(datetime.now().strftime('%Y%m%d'))")
          echo "date_str=$DATE_STR" >> $GITHUB_OUTPUT

          python main.py \
            --days $DAYS \
            --sources arxiv,openalex,pubmed \
            --download \
            --max-pdfs 20 \
            --output both \
            --outdir output

          # 수집 건수 측정
          COUNT=$(python -c "
import json, sys
try:
    data = json.load(open('output/esg_papers_${DATE_STR}.json'))
    print(len(data))
except Exception as e:
    print(0)
" 2>/dev/null || echo 0)
          echo "collected=${COUNT}" >> $GITHUB_OUTPUT
          echo "수집 완료: ${COUNT}건"

      - name: 수집 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: collected-${{ steps.collect.outputs.date_str }}
          path: output/
          if-no-files-found: warn
          retention-days: 30

  # ── JOB 2: 관련성 필터링 + AI 요약 ──────────────────────────
  summarize:
    name: 🤖 필터링 + 요약
    runs-on: ubuntu-latest
    needs: collect
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 수집 결과 다운로드
        uses: actions/download-artifact@v4
        with:
          name: collected-${{ needs.collect.outputs.date_str }}
          path: output/

      - name: 수집 파일 확인
        run: |
          echo "=== output/ 내용 ==="
          ls -la output/ 2>/dev/null || echo "(output/ 없음)"
          JSON=$(ls output/esg_papers_*.json 2>/dev/null | tail -1)
          if [ -z "$JSON" ]; then
            echo "[SKIP] JSON 파일 없음 — 요약 건너뜀"
            exit 0
          fi
          COUNT=$(python -c "import json; print(len(json.load(open('$JSON'))))" 2>/dev/null || echo 0)
          echo "입력 논문: ${COUNT}건 ($JSON)"

      - name: 관련성 필터링 + 요약
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DATE_STR=${{ needs.collect.outputs.date_str }}
          MAX=${{ github.event.inputs.max_summaries || '15' }}
          JSON_FILE="output/esg_papers_${DATE_STR}.json"

          if [ ! -f "$JSON_FILE" ]; then
            echo "[SKIP] $JSON_FILE 없음"
            exit 0
          fi

          python main.py \
            --from-json "$JSON_FILE" \
            --filter \
            --summarize \
            --max-summaries $MAX \
            --outdir output \
            --no-db

      - name: docs/ 에 브리핑 커밋
        run: |
          DATE_STR=${{ needs.collect.outputs.date_str }}
          MD_FILE="output/summary_${DATE_STR}.md"

          if [ ! -f "$MD_FILE" ]; then
            echo "[SKIP] 요약 파일 없음 — docs 커밋 생략"
            exit 0
          fi

          mkdir -p docs/archive
          cp "$MD_FILE" docs/archive/${DATE_STR}.md
          cp "$MD_FILE" docs/index.md

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "📄 ESG 브리핑 ${DATE_STR} 자동 업데이트"
          git push

      - name: 요약 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ needs.collect.outputs.date_str }}
          path: |
            output/summary_*.json
            output/summary_*.md
          if-no-files-found: warn
          retention-days: 90

  # ── JOB 3: 이메일 + Slack 발송 ───────────────────────────────
  notify:
    name: 📬 이메일 + Slack 발송
    runs-on: ubuntu-latest
    needs: [collect, summarize]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 요약 결과 다운로드
        uses: actions/download-artifact@v4
        with:
          name: summary-${{ needs.collect.outputs.date_str }}
          path: output/
        continue-on-error: true

      - name: 알림 발송
        env:
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL:     ${{ secrets.NOTIFY_EMAIL }}
          SLACK_WEBHOOK:    ${{ secrets.SLACK_WEBHOOK }}
          SUMMARIZE_STATUS: ${{ needs.summarize.result }}
          COLLECTED_COUNT:  ${{ needs.collect.outputs.collected_count || 0 }}
          DATE_STR:         ${{ needs.collect.outputs.date_str }}
        run: python scripts/run_notify.py
